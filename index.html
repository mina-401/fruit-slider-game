<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🍉 Fruit Slicer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<!-- 개발자용 — 게임 UI 바깥 아무 곳에나 -->
<button id="devPauseBtn"
  style="position:fixed; top:12px; right:12px; z-index:999;
         background:#1a0a2e; color:#ffe066; border:1px solid #ffe066;
         padding:6px 14px; border-radius:8px; font-size:14px; cursor:pointer;">
  ⏸ 일시정지
</button>
<canvas id="bg-canvas"></canvas>

<div id="wrapper">
  <div id="hud">
    <div id="score-box">🏆 <span id="scoreValue">0</span></div>
    <div id="title-box">FRUIT SLICER</div>
    <div id="lives-box">
      <span class="life-icon" id="life0">❤️</span>
      <span class="life-icon" id="life1">❤️</span>
      <span class="life-icon" id="life2">❤️</span>
    </div>
  </div>

  <div style="position:relative;">
    <canvas id="gameCanvas" width="680" height="500" ></canvas>
    <div id="overlay">
      <div class="fruit-preview" id="overlayEmoji">🍉 🍊 🍋 🍇 🍑</div>
      <h1 id="overlayTitle">Fruit Slicer</h1>
      <p>마우스를 빠르게 휘둘러 과일을 베세요!<br>폭탄💣은 피하세요!</p>
      <div class="score">
        <div class="score-label" id="overlayScoreLabel" style="display:none">최종 점수</div>
        <div class="score-result" id="overlayScore" style="display:none"></div>
      </div>
     
      <button id="startBtn">게임 시작</button>
      <button id="rankingBtn">랭킹 보기</button>
    </div>
    <div id="combo-display"></div>
  </div>
</div>

<script type="module" src="js/main.js"></script> 
</body>
</html>
